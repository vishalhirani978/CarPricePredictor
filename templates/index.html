<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Car Price Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='CSS/style.css') }}">
  </head>
  <body>
    <nav class="navbar navbar-dark bg-dark mb-5">
      <div class="container">
        <span class="navbar-brand mb-0 h1">Car Price Predictor</span>
      </div>
    </nav>

    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
          <div class="card shadow">
            <div class="card-body p-4">
              <h3 class="card-title text-center mb-4">Enter Car Details</h3>
              <form id="predictForm">
                <div class="mb-3">
                  <label for="company" class="form-label">Company</label>
                  <select class="form-select" id="company" name="company" required>
                    <option value="">Select Company</option>
                    {% for company in companies %}
                    <option value="{{ company }}">{{ company }}</option>
                    {% endfor %}
                  </select>
                </div>

                <div class="mb-3">
                  <label for="car_model" class="form-label">Model</label>
                  <select class="form-select" id="car_model" name="car_model" required>
                    <option value="">Select Model</option>
                    {% for model in car_models %}
                    <option value="{{ model }}" data-company="{{ model.split(' ')[0] }}">{{ model }}</option>
                    {% endfor %}
                  </select>
                </div>

                <div class="mb-3">
                  <label for="year" class="form-label">Year</label>
                  <select class="form-select" id="year" name="year" required>
                    <option value="">Select Year</option>
                    {% for year in years %}
                    <option value="{{ year }}">{{ year }}</option>
                    {% endfor %}
                  </select>
                </div>

                <div class="mb-3">
                  <label for="fuel_type" class="form-label">Fuel Type</label>
                  <select class="form-select" id="fuel_type" name="fuel_type" required>
                    <option value="">Select Fuel Type</option>
                    {% for fuel in fuel_types %}
                    <option value="{{ fuel }}">{{ fuel }}</option>
                    {% endfor %}
                  </select>
                </div>

                <div class="mb-4">
                  <label for="kms_driven" class="form-label">Kilometers Driven</label>
                  <input type="number" class="form-control" id="kms_driven" name="kms_driven" min="0" placeholder="e.g. 50000" required>
                </div>

                <div class="d-grid">
                  <button type="submit" class="btn btn-dark btn-lg">Predict Price</button>
                </div>
              </form>

              <div id="result" class="mt-4 text-center d-none">
                <h5>Estimated Price</h5>
                <h2 class="text-success" id="predictedPrice">₹ 0</h2>
              </div>

              <div id="errorAlert" class="alert alert-danger mt-3 d-none" role="alert"></div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const models = {{ car_models | tojson }};

      document.getElementById('company').addEventListener('change', function () {
        const selectedCompany = this.value;
        const modelSelect = document.getElementById('car_model');
        modelSelect.innerHTML = '<option value="">Select Model</option>';

        if (selectedCompany) {
          const filtered = models.filter(m => m.startsWith(selectedCompany));
          filtered.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m;
            opt.textContent = m;
            modelSelect.appendChild(opt);
          });
        }
      });

      document.getElementById('predictForm').addEventListener('submit', async function (e) {
        e.preventDefault();
        const formData = new FormData(this);
        const resultDiv = document.getElementById('result');
        const errorAlert = document.getElementById('errorAlert');
        errorAlert.classList.add('d-none');

        try {
          const res = await fetch('/predict', { method: 'POST', body: formData });
          if (!res.ok) throw new Error('Prediction failed');
          const price = await res.text();
          document.getElementById('predictedPrice').textContent = '₹ ' + Number(price).toLocaleString('en-IN');
          resultDiv.classList.remove('d-none');
        } catch (err) {
          errorAlert.textContent = 'Something went wrong. Please try again.';
          errorAlert.classList.remove('d-none');
          resultDiv.classList.add('d-none');
        }
      });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
